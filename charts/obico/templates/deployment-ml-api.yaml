{{- if .Values.mlApi.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "obico.fullname" . }}-ml-api
  labels:
    {{- include "obico.labels" . | nindent 4 }}
    app.kubernetes.io/component: ml-api
spec:
  replicas: {{ .Values.mlApi.replicaCount }}
  selector:
    matchLabels:
      {{- include "obico.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: ml-api
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "obico.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: ml-api
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "obico.serviceAccountName" . }}
      automountServiceAccountToken: false
      containers:
        - name: ml-api
          image: "{{ .Values.image.mlApi.repository }}:{{ .Values.image.mlApi.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.mlApi.pullPolicy }}
          {{- with .Values.mlApi.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          command:
            {{- toYaml .Values.mlApi.command | nindent 12 }}
          env:
            - name: FLASK_APP
              value: server.py
          ports:
            - name: http
              containerPort: 3333
              protocol: TCP
          # Cheap socket check for liveness; readiness uses /hc/.
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /hc/
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            {{- toYaml .Values.mlApi.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
