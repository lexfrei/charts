{{- if .Values.static }}
apiVersion: v1
kind: Pod
metadata:
  name: {{ include "vipalived.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "vipalived.labels" . | nindent 4 }}
    {{- with .Values.podLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.podAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  automountServiceAccountToken: {{ .Values.automountServiceAccountToken }}
  hostNetwork: {{ .Values.hostNetwork }}
  {{- with .Values.imagePullSecrets }}
  imagePullSecrets:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- if .Values.priorityClassName }}
  priorityClassName: {{ .Values.priorityClassName }}
  {{- end }}
  {{- with .Values.podSecurityContext }}
  securityContext:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- /*
    Static pods consult dedicated scheduling values (staticNodeSelector /
    staticAffinity / staticTolerations) so the DaemonSet defaults don't leak
    into a static pod manifest. nodeSelector and nodeAffinity on a static pod
    are evaluated by NodeRestriction admission against the mirror pod —
    a non-matching selector causes "Predicate NodeAffinity failed" and the pod
    never starts. Defaults are empty; operator sets them only as defense-in-depth
    against placing the manifest on the wrong node.
  */ -}}
  {{- with .Values.staticNodeSelector }}
  nodeSelector:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.staticAffinity }}
  affinity:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.staticTolerations }}
  tolerations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  containers:
    - name: keepalived
      image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
      imagePullPolicy: {{ .Values.image.pullPolicy }}
      # keepalived is baked into the image. A static pod has no ConfigMap (the
      # API server isn't up on Day 1), so write the config inline via heredoc,
      # then exec keepalived. mkdir guards against images that don't ship the
      # /etc/keepalived directory the heredoc writes into.
      command:
        - /bin/sh
        - -c
        - |
          mkdir -p /etc/keepalived
          cat > /etc/keepalived/keepalived.conf <<'EOF'
          {{- include "vipalived.keepalivedConfig" . | nindent 10 }}
          EOF
          exec keepalived --dont-fork --log-console --log-detail --dump-conf
      {{- with .Values.securityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.startupProbe.enabled }}
      startupProbe:
        exec:
          command:
            {{- toYaml .Values.startupProbe.exec.command | nindent 12 }}
        periodSeconds: {{ .Values.startupProbe.periodSeconds }}
        timeoutSeconds: {{ .Values.startupProbe.timeoutSeconds }}
        failureThreshold: {{ .Values.startupProbe.failureThreshold }}
      {{- end }}
      {{- if .Values.livenessProbe.enabled }}
      livenessProbe:
        exec:
          command:
            {{- toYaml .Values.livenessProbe.exec.command | nindent 12 }}
        initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
        periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
        timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds }}
        failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
      {{- end }}
      {{- if .Values.readinessProbe.enabled }}
      readinessProbe:
        exec:
          command:
            {{- toYaml .Values.readinessProbe.exec.command | nindent 12 }}
        periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
        timeoutSeconds: {{ .Values.readinessProbe.timeoutSeconds }}
        failureThreshold: {{ .Values.readinessProbe.failureThreshold }}
        successThreshold: {{ .Values.readinessProbe.successThreshold }}
      {{- end }}
      {{- with .Values.resources }}
      resources:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
