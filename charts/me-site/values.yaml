# -- Automount the API token into the pod. me-site serves a static site and does not talk to the Kubernetes API, so this defaults to false; set true only if your deployment needs API access.
automountServiceAccountToken: false
replicaCount: 1
image:
  repository: ghcr.io/lexfrei/me-site
  tag: latest
  pullPolicy: Always
resources:
  requests:
    cpu: 100m
    memory: 20Mi
  limits:
    cpu: 100m
    memory: 50Mi
containerPort: 8080
servicePort: 8080
# -- Liveness probe. me-site serves a static site, so an HTTP GET on / catches a hung or crashed web server and restarts the pod. Set to null/{} to disable.
livenessProbe:
  httpGet:
    path: /
    port: web
  initialDelaySeconds: 10
  periodSeconds: 20
  timeoutSeconds: 3
  failureThreshold: 3
# -- Readiness probe. Removes the pod from the Service endpoints while it cannot serve, so a rolling update never routes to a not-yet-ready pod. Set to null/{} to disable.
readinessProbe:
  httpGet:
    path: /
    port: web
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3
onionService:
  enabled: true
  backends: 1
  privateKeySecretName: me-site-onion-secret
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
httpRoute:
  enabled: false
  annotations: {}
  parentRefs:
    - name: gateway
      namespace: gateway-system
  hostnames:
    - example.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
vpa:
  enabled: true

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534
  runAsGroup: 65534
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

networkPolicy:
  enabled: false
  ingress: []
  egress: []
